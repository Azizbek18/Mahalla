<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <title>Yangi Retsept Qo'shish</title>
    <link rel="stylesheet" href="yangi.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Yangi retsept</h1>
        <p>Retseptingizni boshqa onajonlar bilan ulashing</p>
      </header>
      <div class="bid_con">
        <div class="form-group">
          <label>OVQAT NOMI</label>
          <input
            type="text"
            placeholder="Masalan: Tandir kabob"
            class="input-full"
          />
        </div>

        <div class="form-group">
          <label>KATEGORIYA</label>
          <div class="category-buttons">
            <button class="btn-category active">Milliy taomlar</button>
            <button class="btn-category">Suyuq ovqatlar</button>
            <button class="btn-category">Salatlar</button>
            <button class="btn-category">Shirinliklar</button>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label>TAYYORLASH VAQTI</label>
            <div class="time-inputs">
              <input type="text" placeholder="Soat" />
              <input type="text" placeholder="Daq" />
            </div>
          </div>
          <div class="col">
            <label>PORSIYA</label>
            <div class="portion-selector">
              <button class="btn-minus">−</button>
              <span>4 kishi</span>
              <button class="btn-plus">+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>TAOM FOTOSURATI</label>
        <div class="photo-upload">
          <div class="icon"></div>
          <p>Foto yuklash</p>
        </div>
      </div>

      <div class="ingredients-section">
        <div class="row-ingredients">
          <div class="ing-name">
            <label>MASALLIQ</label>
            <input type="text" placeholder="Nomi" />
          </div>
          <div class="ing-qty">
            <label>MIQDOR</label>
            <input type="text" placeholder="0.0" />
          </div>
          <div class="ing-unit">
            <label>O'LCHOV</label>
            <select>
              <option>Gramm</option>
            </select>
          </div>
          <button class="btn-add">+ Qo'shish</button>
        </div>

        <ul class="ingredient-list">
          <li>
            <span class="dot"></span> Go'sht
            <span class="val">600g <i class="delete-icon">🗑️</i></span>
          </li>
          <li>
            <span class="dot"></span> Guruch
            <span class="val">500g <i class="delete-icon">🗑️</i></span>
          </li>
        </ul>
      </div>
      <section class="Section-4">
        <div class="step-header">
          <h1 class="a1-qad">1-qadam</h1>
          <span class="step-delete">🗑️</span>
        </div>

        <h1 class="tyyr-qdm">Tayyor qadam</h1>

        <h1 class="masaliq">
Go'shtni o'rtacha bo'laklarga bo'lib, qizigan yog'da tillarang bo'lguncha qovuring. Piyozni yarim halqa qilib to'g'rab qo'shing.
  </h1
        >
      </section>
      <button class="qosh-btn">+ Bosqich qo'shish</button>
      <div class="yanabitta">
        <button class="cancel-btn">Bekor qilish</button>
        <button class="save-btn">Saqlash</button>
      </div>
    </div>
    <script src="./yangi.js"></script>
  </body>
</html>
